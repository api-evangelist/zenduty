aid: zenduty
name: Zenduty
description: >-
  Zenduty is an incident management and on-call platform that orchestrates
  alert routing, escalation policies, on-call schedules, and incident response
  workflows for SRE and DevOps teams. The platform integrates with
  observability tools, ticketing systems, and chat platforms to centralize
  incident triage. Zenduty exposes a REST API for managing incidents,
  services, teams, schedules, and escalation policies, plus an Events API for
  ingesting alerts, all secured with Token authentication.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Incident Management
  - On-Call
  - Alerting
  - SRE
  - DevOps
  - Observability
